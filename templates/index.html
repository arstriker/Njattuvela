<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Njattuvela Calendar</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Njattuvela Calendar</h1>
        <p class="description">
            The Njattuvela calendar is a traditional Kerala system that tracks the Sun's transit through the 27 Nakshatras (star constellations).
            Enter a Gregorian year below to generate the calendar.
        </p>
        <form method="POST">
            <input type="number" name="year" placeholder="Enter a year (e.g., 2024)" required>
            <button type="submit">Generate Calendar</button>
        </form>

        {% if calendar_data_json %}
        <h2>Calendar for {{ year }}</h2>
        <div class="wheel-container">
            <canvas id="wheelCanvas" width="600" height="600"></canvas>
            <div id="spinButton">SPIN</div>
        </div>

        <div id="infoBox" class="hidden">
            <div id="infoBoxContent">
                <!-- Info will be populated by JavaScript -->
            </div>
            <button id="closeInfoBox">Close</button>
        </div>

        <script>
            // Pass data from Flask to JavaScript
            const calendarData = JSON.parse('{{ calendar_data_json|safe }}');
        </script>
        <script src="{{ url_for('static', filename='wheel.js') }}"></script>
        {% endif %}
    </div>
</body>
</html>
